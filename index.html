<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Lista de Tareas</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="container">
    <h2>Lista de Tareas</h2>

    <div class="form">
      <input type="text" placeholder="Escribe una tarea">
      <button>Agregar</button>
    </div>

    <ul class="lista">

      <li class="tarea">
        <span class="descripcion">Estudiar JS</span>
        <span class="fecha">2026-03-25</span>

        <input type="checkbox">

        <button class="editar">Editar</button>
        <button class="eliminar">Eliminar</button>
      </li>

    </ul>
  </div>

</body>
</html>
